repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: lizard
        name: Lizard - Code Complexity
        entry: lizard src/ --warnings_only
        language: system
        files: \.py$
      - id: impactguard-check
        name: ImpactGuard - Full Pipeline Check
        entry: impactguard-check-staged
        language: system
        files: \.py$
        stages:
          - pre-commit
      - id: impactguard-post-commit
        name: ImpactGuard - Post-Commit Analysis
        entry: impactguard-post-commit-hook
        language: system
        always_run: true
        stages:
          - post-commit
